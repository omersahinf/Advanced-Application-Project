name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - name: Compile
        run: ./mvnw -B -q compile
      - name: Test
        env:
          JWT_SECRET: ci-test-secret-at-least-64-characters-long-padding-padding-padding
        run: ./mvnw -B test
      - name: JaCoCo report
        run: ./mvnw -B -q jacoco:report
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-jacoco
          path: backend/target/site/jacoco
          if-no-files-found: ignore
      - name: Package
        run: ./mvnw -B -q -DskipTests package

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npx vitest run

  chatbot:
    name: Chatbot (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chatbot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: chatbot/requirements.txt
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest
      - name: Syntax check
        run: python -m py_compile agents/sql_generator.py llm.py tests/test_sql_generator.py
      - name: Role-scope tests
        run: pytest -q tests/test_sql_generator.py tests/test_role_based_access.py

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend, frontend, chatbot]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: ecom/backend:ci
      - name: Build chatbot image
        uses: docker/build-push-action@v6
        with:
          context: ./chatbot
          push: false
          tags: ecom/chatbot:ci
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: ecom/frontend:ci
