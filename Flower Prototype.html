<style>
  :root {
    /* Wispr Flow tokens (from PROJECT.md) */
    --lumen-dark: #e4e4d0;
    --lumen:      #ffffeb;
    --dawn:       #dfe9e5;
    --dawn-hover: #c9ded7;
    --fathom:     #034f46;
    --fathom-2:   #1c6056;
    --vast:       #1a1a1a;
    --glow:       #ffa946;
    --pulse:      #7f1c34;

    /* Derived */
    --border:     #d5d5c0;
    --border-in:  #c8c8b4;
    --text:       #1a1a1a;
    --text-2:     #666666;
    --text-3:     #999999;
    --hover:      #f5f5e1;
    --hover-nav:  #e4e4d0;
    --active-bg:  rgba(3, 79, 70, 0.08);
    --focus-ring: rgba(3, 79, 70, 0.12);

    /* Semantic */
    --ok:         #16a34a;
    --ok-bg:      #dcfce7;
    --err:        #dc2626;
    --err-bg:     #fce5e5;
    --warn:       #d97706;
    --warn-bg:    #fef3c7;
    --corp-text:  #034f46;
    --corp-bg:    #dfe9e5;

    --sans: 'Inter', system-ui, -apple-system, sans-serif;
    --serif: 'Georgia', 'Times New Roman', serif;
    --display: 'Georgia', 'Times New Roman', serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--lumen-dark); color: var(--text);
               font-family: var(--sans); font-size: 14px; line-height: 1.45;
               -webkit-font-smoothing: antialiased; }
  button, input, select, textarea { font-family: inherit; }
  a { color: var(--fathom); text-decoration: none; }
  a:hover { color: var(--fathom-2); }
  code, pre { font-family: var(--mono); }
  h1, h2, h3, h4 { text-wrap: pretty; margin: 0; color: var(--text); font-weight: 700; }
  h1 { font-size: 28px; letter-spacing: -0.5px; }
  h2 { font-size: 20px; letter-spacing: -0.2px; }
  h3 { font-size: 16px; }
  p  { margin: 0; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-in); border-radius: 999px; border: 2px solid var(--lumen-dark); }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

  /* 3-dot loader */
  .dots { display: inline-flex; gap: 4px; }
  .dots span { width: 6px; height: 6px; border-radius: 999px; background: var(--text-2);
               animation: dot 1.2s infinite ease-in-out; }
  .dots span:nth-child(2) { animation-delay: 0.15s; }
  .dots span:nth-child(3) { animation-delay: 0.30s; }
  @keyframes dot {
    0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
    40% { opacity: 1; transform: translateY(-3px); }
  }

  /* Shared primitives */
  .card { background: var(--lumen); border: 1px solid var(--border); border-radius: 16px;
          box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .btn { display: inline-flex; align-items: center; gap: 8px; border: 1px solid var(--border);
         background: var(--lumen); color: var(--text); padding: 8px 14px; border-radius: 10px;
         font-weight: 500; font-size: 13px; cursor: pointer; transition: background .15s, border-color .15s; }
  .btn:hover { background: var(--hover); }
  .btn-primary { background: var(--dawn); border-color: transparent; color: var(--text); font-weight: 600; }
  .btn-primary:hover { background: var(--dawn-hover); }
  .btn-dark { background: var(--vast); border-color: var(--vast); color: var(--lumen); }
  .btn-dark:hover { background: #333; }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--text-2); }
  .btn-ghost:hover { background: var(--hover); color: var(--text); }
  .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 8px; }
  .btn-danger { color: var(--err); }
  .btn-danger:hover { background: var(--err-bg); }

  .input, .select, .textarea {
    width: 100%; border: 1px solid var(--border-in); background: var(--lumen);
    padding: 9px 12px; border-radius: 10px; font-size: 13.5px; color: var(--text);
    transition: border-color .15s, box-shadow .15s;
  }
  .input:focus, .select:focus, .textarea:focus {
    outline: none; border-color: var(--fathom); box-shadow: 0 0 0 3px var(--focus-ring);
  }
  .input::placeholder { color: var(--text-3); }

  .label { font-weight: 600; font-size: 13px; color: #444; display: block; margin-bottom: 6px; }

  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px;
           font-size: 11px; font-weight: 600; letter-spacing: 0.2px; }
  .badge-ok  { background: var(--ok-bg);  color: var(--ok); }
  .badge-err { background: var(--err-bg); color: var(--err); }
  .badge-corp{ background: var(--corp-bg);color: var(--corp-text); }
  .badge-warn{ background: var(--warn-bg);color: var(--warn); }
  .badge-ind { background: var(--ok-bg);  color: var(--ok); }
  .badge-muted{background: var(--hover); color: var(--text-2); border: 1px solid var(--border); }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: var(--hover); text-align: left; font-weight: 600; color: #444;
             padding: 10px 14px; border-bottom: 1px solid var(--border);
             font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; }
  tbody td { padding: 12px 14px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
  tbody tr:hover td { background: var(--hover); }
  tbody tr:last-child td { border-bottom: none; }

  .section-label { font-size: 10px; color: var(--text-3); letter-spacing: 1.2px;
                   text-transform: uppercase; font-weight: 700; }

  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px;
          border-radius: 999px; background: var(--hover); color: var(--text-2);
          font-size: 12px; font-weight: 500; border: 1px solid var(--border); }

  .divider { height: 1px; background: var(--border); margin: 16px 0; border: none; }
</style>

// Simple bar chart (SVG)
const BarChart = ({ data, height = 160, valueKey = "total", labelKey = "m", barColor = "#034f46" }) => {
  const max = Math.max(...data.map(d => d[valueKey]));
  const W = 100 / data.length;
  return (
    <div style={{ width: "100%" }}>
      <svg width="100%" height={height} viewBox={`0 0 100 ${height}`} preserveAspectRatio="none">
        {data.map((d, i) => {
          const h = (d[valueKey] / max) * (height - 30);
          return (
            <g key={i}>
              <rect x={i * W + W * 0.2} y={height - 22 - h}
                    width={W * 0.6} height={h} rx="1.5" fill={barColor} opacity={0.9}/>

// Stacked area / line chart
const LineChart = ({ data, height = 180, valueKey = "total", labelKey = "m", color = "#034f46", fill = "rgba(3,79,70,0.08)" }) => {
  const W = 100, H = height;
  const max = Math.max(...data.map(d => d[valueKey])) * 1.1;
  const min = 0;
  const points = data.map((d, i) => {
    const x = (i / (data.length - 1)) * W;
    const y = H - 25 - ((d[valueKey] - min) / (max - min)) * (H - 40);
    return [x, y];
  });
  const pathD = points.map((p, i) => (i === 0 ? "M" : "L") + p[0] + " " + p[1]).join(" ");
  const areaD = pathD + ` L ${W} ${H-25} L 0 ${H-25} Z`;
  return (
    <div>
      <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
        <path d={areaD} fill={fill}/>
        <path d={pathD} fill="none" stroke={color} strokeWidth="1.5" vectorEffect="non-scaling-stroke"/>
        {points.map(([x, y], i) => (
          <circle key={i} cx={x} cy={y} r="1.5" fill={color} vectorEffect="non-scaling-stroke"/>
        ))}
      </svg>
      <div style={{ display: "flex", marginTop: 2 }}>
        {data.map((d, i) => (
          <div key={i} style={{ flex: 1, textAlign: "center", fontSize: 10.5, color: "var(--text-3)", fontWeight: 500 }}>
            {d[labelKey]}
          </div>
        ))}
      </div>
    </div>
  );
};

// Donut / ring breakdown
const Donut = ({ data, size = 160, valueKey = "v", labelKey = "c" }) => {
  const total = data.reduce((s, d) => s + d[valueKey], 0);
  let angle = -Math.PI / 2;
  const cx = size / 2, cy = size / 2, r = size / 2 - 8, rIn = r - 18;
  const arcs = data.map(d => {
    const a2 = angle + (d[valueKey] / total) * Math.PI * 2;
    const large = a2 - angle > Math.PI ? 1 : 0;
    const p1 = [cx + r * Math.cos(angle),  cy + r * Math.sin(angle)];
    const p2 = [cx + r * Math.cos(a2),     cy + r * Math.sin(a2)];
    const p3 = [cx + rIn * Math.cos(a2),   cy + rIn * Math.sin(a2)];
    const p4 = [cx + rIn * Math.cos(angle),cy + rIn * Math.sin(angle)];
    const d_ = `M${p1} A${r},${r} 0 ${large} 1 ${p2} L${p3} A${rIn},${rIn} 0 ${large} 0 ${p4} Z`;
    angle = a2;
    return { d: d_, color: d.color, label: d[labelKey], value: d[valueKey] };
  });
  return (
    <div style={{ display: "flex", gap: 20, alignItems: "center" }}>
      <svg width={size} height={size} style={{ flexShrink: 0 }}>
        {arcs.map((a, i) => <path key={i} d={a.d} fill={a.color}/>)}
        <text x={cx} y={cy - 4} textAnchor="middle" style={{ font: "700 15px var(--serif)" }}>{window.fmtUSD ? window.fmtUSD(total).replace(".00", "") : total}</text>
        <text x={cx} y={cy + 14} textAnchor="middle" style={{ font: "500 10px var(--sans)", fill: "#999" }}>Total</text>
      </svg>
      <div style={{ display: "flex", flexDirection: "column", gap: 7, flex: 1 }}>
        {arcs.map((a, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 12.5 }}>
            <div style={{ width: 10, height: 10, borderRadius: 3, background: a.color, flexShrink: 0 }}/>
            <div style={{ flex: 1, color: "var(--text)" }}>{a.label}</div>
            <div style={{ color: "var(--text-2)", fontFamily: "var(--mono)", fontSize: 11.5 }}>
              {window.fmtUSD ? window.fmtUSD(a.value) : a.value}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

        <path d="M12 2 3 7v10l9 5 9-5V7z"/><path d="M3 7l9 5 9-5"/><path d="M12 12v10"/>
      </svg>
    </div>
  );
};

// Empty state
const EmptyState = ({ icon = "package", title, subtitle, action }) => (
  <div style={{ textAlign: "center", padding: "48px 24px", color: "var(--text-2)" }}>

// Dialog shell
const Dialog = ({ title, onClose, children, footer, width = 480 }) => (

Object.assign(window, { Icon, FlowerLogo, Stars, RoleBadge, StatusPill, KpiCard,

</script>

<script type="text/babel" data-presets="react">
// Login page — Wispr Flow get-started style, Flower brand

const { useState: useStateLogin } = React;

function LoginPage({ onLogin }) {
  const [email, setEmail] = useStateLogin("");
  const [password, setPassword] = useStateLogin("");
  const [loading, setLoading] = useStateLogin(false);
  const [error, setError] = useStateLogin(null);

  function quickLogin(role) {
    const acc = window.SEED.demoAccounts.find(a => a.role === role);
    if (acc) { setEmail(acc.email); setPassword(acc.pwd); submit(acc); }
  }

  function submit(maybeAcc) {
    setError(null); setLoading(true);
    setTimeout(() => {
      const acc = maybeAcc || window.SEED.demoAccounts.find(
        a => a.email === email && a.pwd === password
      );
      if (!acc) { setError("Invalid email or password."); setLoading(false); return; }
      onLogin(acc);
      setLoading(false);
    }, 450);
  }

  return (
    <div style={{
      minHeight: "100vh", background: "#e4e4d0",
      display: "flex", flexDirection: "column", alignItems: "center",
      justifyContent: "flex-start",
      padding: "5rem 2rem 4rem", gap: "2.5rem",
    }}>
      {/* Brand row */}

function IndCart({ cart, setCart, nav }) {
  const items = cart.map(c => ({ ...c, p: window.productById(c.id) })).filter(c => c.p);
  const subtotal = items.reduce((s, i) => s + i.p.price * i.qty, 0);
  const tax = subtotal * 0.08;
  const shipping = subtotal > 100 ? 0 : 8.99;
  const total = subtotal + tax + shipping;

  function updateQty(id, delta) {
    setCart(c => c.map(i => i.id === id ? { ...i, qty: Math.max(1, i.qty + delta) } : i));
  }
  function removeItem(id) { setCart(c => c.filter(i => i.id !== id)); }

  if (!items.length) return (
    <div style={{ padding: "40px 32px" }}>
      <div className="card" style={{ padding: 40 }}>
        <EmptyState icon="cart" title="Your cart is empty"
          subtitle="Browse Flower's stores to find something you love."
          action={<button className="btn btn-primary" onClick={() => nav("ind-products")}>Browse products <Icon name="arrow_right" size={13}/></button>}/>
      </div>
    </div>
  );

  return (
    <div style={{ padding: "12px 32px 40px", display: "grid", gridTemplateColumns: "1fr 340px", gap: 20 }}>
      <div className="card" style={{ padding: 0 }}>
        <div style={{ padding: "14px 20px", borderBottom: "1px solid var(--border)" }}>
          <h2 style={{ fontFamily: "var(--serif)" }}>Cart · {items.length} item{items.length !== 1 ? "s" : ""}</h2>
        </div>
        {items.map(({ p, qty, id }) => (
          <div key={id} style={{ display: "flex", gap: 14, padding: 18, borderBottom: "1px solid var(--border)" }}>
            <ProductThumb id={p.id} size={80}/>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: "var(--text-3)", fontFamily: "var(--mono)" }}>{p.sku}</div>
              <div style={{ fontWeight: 600, marginTop: 2 }}>{p.name}</div>
              <div style={{ fontSize: 12.5, color: "var(--text-2)", marginTop: 4 }}>{p.desc}</div>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 12 }}>
                <div style={{ display: "inline-flex", border: "1px solid var(--border)", borderRadius: 10, background: "var(--lumen)" }}>
                  <button className="btn-ghost" onClick={() => updateQty(id, -1)} style={{ border: "none", background: "none", padding: "6px 10px", cursor: "pointer" }}><Icon name="minus" size={12}/></button>
                  <span style={{ padding: "6px 14px", fontWeight: 600, fontSize: 13 }}>{qty}</span>
                  <button className="btn-ghost" onClick={() => updateQty(id, 1)} style={{ border: "none", background: "none", padding: "6px 10px", cursor: "pointer" }}><Icon name="plus" size={12}/></button>
                </div>
                <button onClick={() => removeItem(id)} className="btn btn-ghost btn-danger btn-sm"><Icon name="trash" size={13}/> Remove</button>
              </div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ font: "700 18px/1.1 var(--serif)" }}>{window.fmtUSD(p.price * qty)}</div>
              <div style={{ fontSize: 11, color: "var(--text-3)", marginTop: 3 }}>{window.fmtUSD(p.price)} each</div>
            </div>
          </div>
        ))}
      </div>

      <div className="card" style={{ padding: 20, alignSelf: "start", position: "sticky", top: 100 }}>
        <h3 style={{ fontFamily: "var(--serif)", marginBottom: 14 }}>Order summary</h3>
        <Row label="Subtotal" value={window.fmtUSD(subtotal)}/>
        <Row label="Tax (8%)" value={window.fmtUSD(tax)}/>

        </div>
      </div>

  );

  );
}

function StackedBarChart() {
  const data = window.SEED.revenueByMonth;
  const max = Math.max(...data.map(d => d.total)) * 1.1;
  return (
    <div>
      <svg width="100%" height="180" viewBox="0 0 100 180" preserveAspectRatio="none">
        {data.map((d, i) => {
          const xw = 100 / data.length;
          const x = i * xw + xw * 0.22;
          const w = xw * 0.56;
          const scale = 150 / max;
          const h = (v) => v * scale;
          let y = 160;
          const segs = [
            { v: d.tc, c: "#034f46" },
            { v: d.gm, c: "#dfe9e5" },
            { v: d.fh, c: "#ffa946" },
            { v: d.he, c: "#d5d5c0" },
          ];
          return <g key={i}>
            {segs.map((s, j) => {
              const hh = h(s.v);
              const rect = <rect key={j} x={x} y={y - hh} width={w} height={hh} fill={s.c}
                                 rx={j === 0 ? 1.5 : 0}/>;
              y -= hh;
              return rect;
            })}
          </g>;
        })}
      </svg>
      <div style={{ display: "flex", marginTop: 4 }}>
        {data.map((d, i) => (
          <div key={i} style={{ flex: 1, textAlign: "center", fontSize: 10.5, color: "var(--text-3)", fontWeight: 500 }}>{d.m}</div>
        ))}
      </div>
    </div>
  );
}

<script type="text/babel" data-presets="react">
// Flower AI — Text2SQL multi-agent chatbot view

const { useState: useStateChat, useEffect: useEffectChat, useRef: useRefChat } = React;

// Canned SQL + data for each prompt, per role
const CANNED = {

FROM orders o
JOIN order_items oi ON oi.order_id = o.id
JOIN products p     ON p.id = oi.product_id
JOIN categories c   ON c.id = p.category_id
WHERE o.order_date >= date_trunc('month', current_date) - interval '1 month'
  AND o.order_date <  date_trunc('month', current_date)
  AND o.status != 'CANCELLED'
GROUP BY c.name
ORDER BY revenue DESC;`,
    cols: ["category", "orders", "revenue"],
    rows: [
      ["Computers", 182, 42810.44],

    sql: `SELECT u.first_name || ' ' || u.last_name AS customer,
       COUNT(DISTINCT o.id) AS orders,

FROM orders o
JOIN users u ON u.id = o.user_id
WHERE o.store_id = :store_id    -- injected from JWT
  AND o.status IN ('CONFIRMED','SHIPPED','DELIVERED')
GROUP BY u.id, u.first_name, u.last_name
ORDER BY revenue DESC
LIMIT 5;`,
    cols: ["customer", "orders", "revenue"],
    rows: [

    answer: "Your top customer is Selin Demir with $819.94 across 4 orders — she accounts for ~40% of your top-5 revenue. Your loyalty cohort skews toward electronics buyers who purchase accessories alongside primary devices.",
  },
  "Which products have the lowest ratings?": {
    role: "CORPORATE",
    sql: `SELECT p.name, p.sku, AVG(r.star_rating) AS avg_rating, COUNT(r.id) AS review_count
FROM products p
LEFT JOIN reviews r ON r.product_id = p.id
WHERE p.store_id = :store_id    -- injected from JWT
GROUP BY p.id, p.name, p.sku
HAVING COUNT(r.id) >= 5
ORDER BY avg_rating ASC
LIMIT 5;`,
    cols: ["name", "sku", "avg_rating", "review_count"],
    rows: [
      ["Gaming Mouse X500", "TC-002", 4.30, 88],
      ["Mechanical Keyboard MX", "TC-007", 4.40, 45],
      ["Wireless Keyboard Pro", "TC-001", 4.50, 124],
      ["Smart Watch Series X", "TC-010", 4.60, 201],
      ["Wireless Earbuds Pro", "TC-009", 4.70, 312],
    ],
    chart: { type: "bar", x: "sku", y: "avg_rating", color: "#dc2626" },
    answer: "Gaming Mouse X500 is your lowest-rated product at 4.30★ across 88 reviews — recent complaints mention a squeaky scroll wheel. Consider reviewing supplier QC or offering proactive replacements.",

  "How much have I spent this year?": {
    role: "INDIVIDUAL",
    sql: `SELECT date_trunc('month', o.order_date) AS month,
       COUNT(*) AS orders,
       SUM(o.grand_total) AS spent
FROM orders o
WHERE o.user_id = :user_id        -- injected from JWT
  AND o.order_date >= date_trunc('year', current_date)
  AND o.status != 'CANCELLED'
GROUP BY 1
ORDER BY 1;`,
    cols: ["month", "orders", "spent"],
    rows: [
      ["2026-01", 2, 137.98],
      ["2026-02", 3, 268.96],
      ["2026-03", 2, 346.99],
    ],
    chart: { type: "line", x: "month", y: "spent", color: "#034f46" },
    answer: "You've spent $753.93 across 7 orders so far this year, with March leading at $346.99. Your monthly spend has trended upward for three months running.",

  "What's the trend in order cancellations?": {
    role: "ADMIN",
    sql: `SELECT date_trunc('month', order_date) AS month,
       COUNT(*) FILTER (WHERE status='CANCELLED')::float / NULLIF(COUNT(*),0) AS cancel_rate,
       COUNT(*) AS total_orders
FROM orders
WHERE order_date >= current_date - interval '6 months'
GROUP BY 1
ORDER BY 1;`,
    cols: ["month", "cancel_rate", "total_orders"],
    rows: [
      ["2025-10", 0.041, 612],
      ["2025-11", 0.038, 740],
      ["2025-12", 0.029, 882],
      ["2026-01", 0.032, 910],

      ["2026-03", 0.022, 1184],
    ],

    answer: "Cancellation rate has trended down for four of the last five months — from 4.1% in October to 2.2% in March. This correlates with the new 24-hour fulfilment SLA you rolled out in November.",
  },
  "How many orders were shipped by air?": {

    sql: `SELECT s.mode_of_shipment, COUNT(*) AS count
FROM shipments s
JOIN orders o ON o.id = s.order_id
WHERE o.store_id = :store_id    -- injected from JWT
GROUP BY s.mode_of_shipment
ORDER BY count DESC;`,
    cols: ["mode_of_shipment", "count"],
    rows: [["Air", 487], ["Road", 642], ["Ship", 155]],
    chart: { type: "bar", x: "mode_of_shipment", y: "count", color: "#034f46" },
    answer: "487 of your 1,284 orders (38%) shipped by air. Road remains primary at 50%, with sea freight covering the rest — mostly international bulk SKUs.",
  },
};

// Pipeline steps shown during "thinking"
const PIPELINE = [
  { k: "guardrails", label: "Guardrails", icon: "shield",   desc: "Is the question in scope? Any prompt injection?" },
  { k: "sql",        label: "SQL Generator", icon: "database", desc: "Translate natural language to SQL + inject role filter" },
  { k: "exec",       label: "Executor",  icon: "bolt",     desc: "Run SELECT against read-only database" },
  { k: "analyst",    label: "Analyst",   icon: "book",     desc: "Explain results in natural language" },
  { k: "viz",        label: "Visualizer",icon: "chart",    desc: "Build Plotly chart (AST-validated, sandboxed)" },
];

function ChatbotPage({ me }) {
  const [input, setInput] = useStateChat("");
  const [messages, setMessages] = useStateChat([
    { role: "assistant", kind: "intro" },
  ]);
  const [thinking, setThinking] = useStateChat(null); // step index
  const scrollRef = useRefChat(null);

  useEffectChat(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, thinking]);

  const prompts = window.SEED.suggestedPrompts[me.role] || [];

  function send(text) {
    const q = (text || input).trim();
    if (!q) return;
    setInput("");
    setMessages(m => [...m, { role: "user", text: q }]);

    const match = CANNED[q];
    // Guardrails: block injection attempts
    const blocked = /ignore (your )?previous instructions|you are now|system override|reveal.*prompt|list all users|show all users/i.test(q);
    if (blocked) {
      setThinking(0);
      setTimeout(() => {
        setThinking(null);
        setMessages(m => [...m, {
          role: "assistant", kind: "blocked",
          text: "That request looks like it's trying to change my role or bypass access controls. I can only answer questions scoped to your authenticated role (" + me.role + ").",
          layer: "Guardrails Agent + InputValidator (Spring Boot regex)",
        }]);
      }, 900);
      return;
    }

    // Walk the pipeline
    let step = 0;
    setThinking(step);
    const tick = () => {
      step++;
      if (step >= PIPELINE.length) {
        setThinking(null);
        if (match) {
          setMessages(m => [...m, {
            role: "assistant", kind: "result", data: match, userAsked: q,
          }]);
        } else {
          setMessages(m => [...m, {
            role: "assistant", kind: "text",
            text: `I don't have a pre-built answer for "${q}" in this prototype, but in the live system the SQL Generator agent would translate it to a role-scoped SELECT query, execute it, and explain the results. Try one of the suggested prompts below.`,
          }]);
        }
        return;
      }
      setThinking(step);
      setTimeout(tick, 550 + Math.random() * 250);
    };
    setTimeout(tick, 600);
  }

  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 300px", gap: 0, height: "calc(100vh - 101px)" }}>
      <div style={{ display: "flex", flexDirection: "column", minHeight: 0, borderRight: "1px solid var(--border)" }}>
        <div ref={scrollRef} style={{ flex: 1, overflowY: "auto", padding: "24px 32px 0" }}>
          {messages.map((m, i) => (
            <Message key={i} m={m} me={me} onPrompt={send}/>
          ))}
          {thinking !== null && <ThinkingBlock step={thinking}/>}
        </div>

        <div style={{ padding: "16px 32px 24px", borderTop: "1px solid var(--border)", background: "var(--lumen-dark)" }}>
          <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
            {prompts.slice(0, 4).map(p => (
              <button key={p} onClick={() => send(p)}
                className="chip" style={{ cursor: "pointer", background: "var(--lumen)", padding: "6px 12px" }}>
                <Icon name="sparkle" size={11}/>{p}
              </button>
            ))}
          </div>
          <div style={{ display: "flex", gap: 10, alignItems: "flex-end",
                        background: "var(--lumen)", border: "1px solid var(--border-in)", borderRadius: 14,
                        padding: "10px 12px" }}>
            <textarea rows={1} value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
              placeholder={`Ask Flower AI · authenticated as ${me.role}`}
              style={{ flex: 1, border: "none", background: "transparent", outline: "none", resize: "none",
                       fontSize: 14, fontFamily: "var(--sans)", padding: "6px 4px", color: "var(--text)", lineHeight: 1.5 }}/>
            <button className="btn btn-primary" disabled={!input.trim()} onClick={() => send()} style={{ padding: "8px 14px" }}>
              <Icon name="send" size={14}/>
            </button>
          </div>
          <div style={{ display: "flex", gap: 14, marginTop: 8, fontSize: 11, color: "var(--text-3)" }}>
            <span><Icon name="shield" size={11}/> Role-scoped via JWT</span>
            <span><Icon name="database" size={11}/> SELECT-only · READ ONLY txn</span>
            <span><Icon name="bolt" size={11}/> Gemini · LangGraph</span>
          </div>
        </div>
      </div>

      {/* Right rail: pipeline + session */}
      <div style={{ padding: "20px 20px 28px", background: "var(--lumen)", overflowY: "auto" }}>
        <div className="section-label" style={{ marginBottom: 10 }}>Agent pipeline</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 4, marginBottom: 24 }}>
          {PIPELINE.map((s, i) => {
            const active = thinking === i;
            const done = thinking !== null && i < thinking;
            return (
              <div key={s.k} style={{
                display: "flex", gap: 10, padding: "10px 8px", borderRadius: 8,
                background: active ? "rgba(3,79,70,0.08)" : "transparent",

                <div style={{
                  width: 26, height: 26, borderRadius: 7, flexShrink: 0,

                  display: "flex", alignItems: "center", justifyContent: "center",
                }}>
                  {done ? <Icon name="check" size={13}/> : <Icon name={s.icon} size={13}/>}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 12.5, fontWeight: 600 }}>{s.label}
                    {active && <span style={{ marginLeft: 8 }} className="dots"><span/><span/><span/></span>}
                  </div>
                  <div style={{ fontSize: 11, color: "var(--text-3)", marginTop: 2, lineHeight: 1.35 }}>{s.desc}</div>
                </div>
              </div>
            );
          })}
        </div>

        <div className="section-label" style={{ marginBottom: 10 }}>Session context</div>
        <div style={{ padding: 12, background: "var(--hover)", borderRadius: 10, fontFamily: "var(--mono)", fontSize: 11.5, lineHeight: 1.7 }}>
          <div>user_role = <b>{me.role}</b></div>
          <div>user_id   = {me.userId || me.storeId ? me.userId || "—" : "—"}</div>
          <div>store_id  = {me.storeId || "—"}</div>
          <div>session   = sess_b82f…a04c</div>
          <div>turns     = {messages.filter(m => m.role === "user").length} / 10</div>
          <div style={{ marginTop: 6, paddingTop: 6, borderTop: "1px solid var(--border)", color: "var(--text-3)" }}>
            rate_limit: 20 req / min

        </div>

        <div className="section-label" style={{ margin: "20px 0 10px" }}>Try asking</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {prompts.map(p => (
            <button key={p} onClick={() => send(p)} style={{
              textAlign: "left", padding: "9px 12px", background: "var(--hover)",

              fontSize: 12.5, color: "var(--text)", fontFamily: "inherit",
            }}>{p}</button>

}

function ThinkingBlock({ step }) {
  const s = PIPELINE[step];
  return (
    <div style={{ display: "flex", gap: 12, marginBottom: 20 }}>
      <Avatar name="AI" size={34} bg="linear-gradient(135deg, #034f46, #1c6056)"/>
      <div className="card" style={{ padding: "12px 16px", background: "var(--hover)", border: "1px dashed var(--border-in)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <Icon name={s.icon} size={14}/>
          <span style={{ fontSize: 13, fontWeight: 600 }}>{s.label}</span>
          <span className="dots"><span/><span/><span/></span>
        </div>
        <div style={{ fontSize: 12, color: "var(--text-2)", marginTop: 4 }}>{s.desc}</div>
      </div>
    </div>

}

function Message({ m, me, onPrompt }) {
  if (m.role === "user") {
    return (
      <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 18, gap: 10 }}>
        <div style={{ maxWidth: "70%", background: "#dfe9e5", color: "#1a1a1a",
                      padding: "10px 14px", borderRadius: "14px 14px 3px 14px", fontSize: 14 }}>
          {m.text}
        </div>
        <Avatar name={me.name} size={30}/>
      </div>
    );
  }

  if (m.kind === "intro") {
    return (
      <div style={{ display: "flex", gap: 12, marginBottom: 24 }}>
        <Avatar name="AI" size={34} bg="linear-gradient(135deg, #034f46, #1c6056)"/>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 14 }}>
            Hi <b>{me.first || me.name.split(" ")[0]}</b>, I'm Flower's analytics assistant. I translate natural-language
            questions into SQL queries, run them against the read-only replica, and explain the results in plain English.
          </div>
          <div style={{ marginTop: 14, padding: "12px 14px", background: "var(--hover)", borderRadius: 12, fontSize: 12.5, color: "var(--text-2)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4, color: "var(--text)" }}>
              <Icon name="shield" size={13}/> <b>Role-scoped access</b>
            </div>
            You're authenticated as <b>{me.role}</b>. Every SQL query I run has a role filter injected
            deterministically — I physically cannot see another user's private data, even if the LLM is tricked.
          </div>
        </div>
      </div>
    );
  }

  if (m.kind === "blocked") {
    return (
      <div style={{ display: "flex", gap: 12, marginBottom: 20 }}>
        <Avatar name="AI" size={34} bg="linear-gradient(135deg, #7f1c34, #a42244)"/>
        <div className="card" style={{ flex: 1, padding: 14, background: "#fce5e5", border: "1px solid #f2b5b5" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6, color: "#7f1c34", fontWeight: 600 }}>
            <Icon name="shield" size={14}/> Request blocked
          </div>
          <div style={{ fontSize: 13.5, color: "var(--text)" }}>{m.text}</div>
          <div style={{ marginTop: 8, fontSize: 11.5, color: "var(--text-3)", fontFamily: "var(--mono)" }}>Caught by: {m.layer}</div>
        </div>
      </div>
    );
  }

  if (m.kind === "text") {
    return (
      <div style={{ display: "flex", gap: 12, marginBottom: 20 }}>
        <Avatar name="AI" size={34} bg="linear-gradient(135deg, #034f46, #1c6056)"/>
        <div style={{ flex: 1, fontSize: 14, padding: "6px 0", lineHeight: 1.55 }}>{m.text}</div>
      </div>
    );
  }

  if (m.kind === "result") {
    return <ResultBlock data={m.data}/>;
  }
  return null;
}

function ResultBlock({ data }) {
  const [tab, setTab] = useStateChat("answer");
  return (
    <div style={{ display: "flex", gap: 12, marginBottom: 24 }}>
      <Avatar name="AI" size={34} bg="linear-gradient(135deg, #034f46, #1c6056)"/>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 14, lineHeight: 1.55, marginBottom: 14 }}>{data.answer}</div>

        <div className="card" style={{ padding: 0, overflow: "hidden" }}>
          <div style={{ display: "flex", borderBottom: "1px solid var(--border)", background: "var(--hover)" }}>
            {[["answer", "Chart", "chart"], ["table", "Table", "layers"], ["sql", "SQL", "database"]].map(([k, l, ic]) => (
              <button key={k} onClick={() => setTab(k)}
                style={{
                  padding: "10px 16px", border: "none", background: tab === k ? "var(--lumen)" : "transparent",
                  cursor: "pointer", fontSize: 12.5, fontWeight: 600,
                  color: tab === k ? "var(--fathom)" : "var(--text-2)",
                  borderBottom: tab === k ? "2px solid var(--fathom)" : "2px solid transparent",
                  display: "flex", alignItems: "center", gap: 6,
                }}>
                <Icon name={ic} size={12}/>{l}
              </button>
            ))}
            <div style={{ flex: 1 }}/>
            <div style={{ padding: "10px 14px", display: "flex", gap: 6 }}>
              <button className="btn btn-ghost btn-sm" title="Copy"><Icon name="edit" size={13}/></button>
              <button className="btn btn-ghost btn-sm" title="Download"><Icon name="download" size={13}/></button>
            </div>
          </div>

          <div style={{ padding: 18 }}>
            {tab === "answer" && <ChartPanel data={data}/>}
            {tab === "table"  && <TablePanel data={data}/>}
            {tab === "sql"    && <SqlPanel data={data}/>}
          </div>
        </div>
      </div>
    </div>
  );
}

function ChartPanel({ data }) {
  const chartData = data.rows.map(r => Object.fromEntries(data.cols.map((c, i) => [c, r[i]])));
  const xKey = data.chart.x, yKey = data.chart.y;
  const barData = chartData.map(d => ({ m: String(d[xKey]).length > 12 ? String(d[xKey]).slice(0, 12) + "…" : String(d[xKey]), total: d[yKey] }));
  const isCurrency = /revenue|spent|total|price/i.test(yKey);
  return (
    <div>
      <div style={{ fontSize: 11, color: "var(--text-3)", fontFamily: "var(--mono)", marginBottom: 8, display: "flex", justifyContent: "space-between" }}>
        <span>plotly.{data.chart.type} · x={data.chart.x}, y={data.chart.y}</span>
        <span>rendered in sandboxed iframe</span>
      </div>
      {data.chart.type === "line"
        ? <LineChart data={barData} valueKey="total" labelKey="m" color={data.chart.color} fill={data.chart.color + "20"} height={240}/>
        : <BarChart  data={barData} valueKey="total" labelKey="m" barColor={data.chart.color} height={240}/>}
      <div style={{ marginTop: 10, fontSize: 11, color: "var(--text-3)", textAlign: "center" }}>
        {data.cols.map(c => c.toUpperCase()).join(" · ")}
      </div>
    </div>
  );
}

function TablePanel({ data }) {
  return (
    <div style={{ overflowX: "auto" }}>
      <table>
        <thead><tr>{data.cols.map(c => <th key={c}>{c}</th>)}</tr></thead>
        <tbody>
          {data.rows.map((r, i) => (
            <tr key={i}>
              {r.map((v, j) => (
                <td key={j} style={{ fontFamily: typeof v === "number" ? "var(--mono)" : undefined,
                                     textAlign: typeof v === "number" ? "right" : "left" }}>
                  {typeof v === "number"
                    ? (data.cols[j].match(/revenue|spent|total|price/i) ? window.fmtUSD(v)
                        : data.cols[j].match(/rate/i) ? (v * 100).toFixed(1) + "%"
                        : data.cols[j].match(/rating/i) ? v.toFixed(2) + "★"
                        : v.toLocaleString())
                    : v}
                </td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function SqlPanel({ data }) {
  return (
    <div>
      <pre style={{ margin: 0, padding: 16, background: "#1a1a1a", color: "#ffffeb",
                    borderRadius: 10, fontSize: 12.5, lineHeight: 1.55, overflowX: "auto",
                    fontFamily: "var(--mono)" }}>{highlightSql(data.sql)}</pre>
      <div style={{ marginTop: 10, padding: "10px 12px", background: "rgba(3,79,70,0.08)", borderRadius: 10, fontSize: 12, color: "var(--fathom)", display: "flex", gap: 8, alignItems: "flex-start" }}>
        <Icon name="shield" size={14}/>
        <div>
          <b>Role filter injected deterministically.</b> The <code>:store_id</code> / <code>:user_id</code> bind
          parameters come from the JWT's verified claims — never from the LLM output or conversation history.
        </div>
      </div>
    </div>
  );
}

function highlightSql(sql) {
  const kw = /\b(SELECT|FROM|WHERE|GROUP BY|ORDER BY|LIMIT|AS|JOIN|LEFT JOIN|RIGHT JOIN|INNER JOIN|ON|AND|OR|NOT|IN|NULL|IS|HAVING|WITH|UNION|INTERSECT|EXCEPT|CASE|WHEN|THEN|ELSE|END|DISTINCT|COUNT|SUM|AVG|MAX|MIN|FILTER|INTERVAL|CURRENT_DATE|DATE_TRUNC|NULLIF)\b/gi;
  const parts = [];
  let last = 0;
  sql.replace(kw, (m, _, idx) => {
    if (idx > last) parts.push(sql.slice(last, idx));
    parts.push(<span key={idx} style={{ color: "#dfe9e5", fontWeight: 600 }}>{m.toUpperCase()}</span>);
    last = idx + m.length;
    return m;
  });
  parts.push(sql.slice(last));
  // comments
  return parts.map((p, i) => {
    if (typeof p !== "string") return p;
    const segs = [];
    let li = 0;
    p.replace(/--[^\n]*/g, (m, idx) => {
      if (idx > li) segs.push(p.slice(li, idx));
      segs.push(<span key={"c" + i + idx} style={{ color: "#8ca8a4" }}>{m}</span>);
      li = idx + m.length;
      return m;
    });
    segs.push(p.slice(li));
    return <React.Fragment key={i}>{segs}</React.Fragment>;
  });
}

Object.assign(window, { ChatbotPage });

<script type="text/babel" data-presets="react">
// Flower app entry

const { useState, useEffect, useMemo } = React;

// ------------------------------------------------------------
// Tweak defaults — editable via the Tweaks toolbar toggle
// ------------------------------------------------------------
const TWEAKS = /*EDITMODE-BEGIN*/{
  "density": "comfortable",
  "accent": "fathom",
  "sidebarCollapsedDefault": false,
  "showRoleSwitcher": true
}/*EDITMODE-END*/;

const ACCENTS = {
  fathom: { label: "Fathom (default)", primary: "#034f46", primary2: "#1c6056", dawn: "#dfe9e5", dawnHover: "#c9ded7" },
  dawn:   { label: "Dawn (lavender)", primary: "#034f46", primary2: "#1c6056", dawn: "#dfe9e5", dawnHover: "#c9ded7" },
  glow:   { label: "Glow (amber)",   primary: "#c46a1a", primary2: "#e18c2f", dawn: "#ffe4c0", dawnHover: "#f7d1a0" },
  pulse:  { label: "Pulse (plum)",   primary: "#7f1c34", primary2: "#a42244", dawn: "#dfe9e5", dawnHover: "#c9ded7" },
};

function applyTweaks(t) {
  const a = ACCENTS[t.accent] || ACCENTS.fathom;
  const r = document.documentElement.style;
  r.setProperty("--fathom", a.primary);
  r.setProperty("--fathom-2", a.primary2);
  r.setProperty("--dawn", a.dawn);
  r.setProperty("--dawn-hover", a.dawnHover);
  r.setProperty("--active-bg", `color-mix(in srgb, ${a.primary} 8%, transparent)`);
  r.setProperty("--focus-ring", `color-mix(in srgb, ${a.primary} 18%, transparent)`);
  document.body.dataset.density = t.density;
}

// ------------------------------------------------------------
// Landing routes per role
// ------------------------------------------------------------
const ROLE_HOME = {
  INDIVIDUAL: "ind-dashboard",
  CORPORATE:  "corp-dashboard",
  ADMIN:      "adm-dashboard",
};

// ------------------------------------------------------------
// Persistence helpers
// ------------------------------------------------------------
const LS_ME    = "flower.me";
const LS_ROUTE = "flower.route";
const LS_CART  = "flower.cart";
const LS_COLL  = "flower.sidebar.collapsed";

function loadLS(k, fallback) {
  try { const v = localStorage.getItem(k); return v == null ? fallback : JSON.parse(v); }
  catch { return fallback; }
}
function saveLS(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
}

// ------------------------------------------------------------
// Root App
// ------------------------------------------------------------
function App() {
  const [tweaks, setTweaks]     = useState(TWEAKS);
  const [editMode, setEditMode] = useState(false);
  const [me, setMe]             = useState(() => loadLS(LS_ME, null));
  const [route, setRoute]       = useState(() => loadLS(LS_ROUTE, null));
  const [cart, setCart]         = useState(() => loadLS(LS_CART, []));
  const [collapsed, setCollapsed] = useState(() => loadLS(LS_COLL, TWEAKS.sidebarCollapsedDefault));

  useEffect(() => { applyTweaks(tweaks); }, [tweaks]);
  useEffect(() => { saveLS(LS_ME, me); }, [me]);
  useEffect(() => { saveLS(LS_ROUTE, route); }, [route]);
  useEffect(() => { saveLS(LS_CART, cart); }, [cart]);
  useEffect(() => { saveLS(LS_COLL, collapsed); }, [collapsed]);

  // Tweaks protocol — register listener BEFORE announcing availability
  useEffect(() => {
    function onMsg(e) {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode")   setEditMode(true);
      if (d.type === "__deactivate_edit_mode") setEditMode(false);
    }
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  function updateTweak(key, value) {
    setTweaks(t => {
      const next = { ...t, [key]: value };
      window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [key]: value } }, "*");
      return next;
    });
  }

  function onLogin(acc) {
    setMe(acc);
    setRoute(ROLE_HOME[acc.role]);
  }
  function onLogout() {
    setMe(null);
    setRoute(null);
    setCart([]);
    localStorage.removeItem(LS_ME);
    localStorage.removeItem(LS_ROUTE);
    localStorage.removeItem(LS_CART);
  }
  function switchRole(roleKey) {
    const acc = window.SEED.demoAccounts.find(a => a.role === roleKey);
    if (acc) onLogin(acc);
  }
  function addToCart(productId) {
    setCart(c => {
      const ex = c.find(x => x.id === productId);
      if (ex) return c.map(x => x.id === productId ? { ...x, qty: x.qty + 1 } : x);
      return [...c, { id: productId, qty: 1 }];
    });
  }

  if (!me) return (
    <>
      <LoginPage onLogin={onLogin}/>
      {editMode && <TweaksPanel tweaks={tweaks} update={updateTweak} onClose={() => setEditMode(false)}/>}
    </>
  );

  // Role-aware route whitelist — guard against a stale route after role switch
  const roleRoutes = {
    INDIVIDUAL: ["ind-dashboard","ind-products","ind-cart","ind-checkout","ind-orders","ind-reviews","chat"],
    CORPORATE:  ["corp-dashboard","corp-products","corp-orders","corp-reviews","chat"],
    ADMIN:      ["adm-dashboard","adm-users","adm-stores","adm-categories","adm-analytics","adm-audit","adm-settings","chat"],
  };
  const current = roleRoutes[me.role].includes(route) ? route : ROLE_HOME[me.role];
  const nav = (k) => setRoute(k);

  // Render the right page
  let page;
  const cartCount = cart.reduce((s, c) => s + c.qty, 0);

  switch (current) {
    // Individual
    case "ind-dashboard": page = <IndDashboard me={me} nav={nav}/>; break;
    case "ind-products":  page = <IndProducts nav={nav} addToCart={addToCart}/>; break;
    case "ind-cart":      page = <IndCart cart={cart} setCart={setCart} nav={nav}/>; break;
    case "ind-checkout":  page = <IndCheckout cart={cart} setCart={setCart} nav={nav}/>; break;
    case "ind-orders":    page = <IndOrders/>; break;
    case "ind-reviews":   page = <IndReviews/>; break;
    // Corporate
    case "corp-dashboard":page = <CorpDashboard nav={nav}/>; break;
    case "corp-products": page = <CorpProducts/>; break;
    case "corp-orders":   page = <CorpOrders/>; break;
    case "corp-reviews":  page = <CorpReviews/>; break;
    // Admin
    case "adm-dashboard": page = <AdmDashboard nav={nav}/>; break;
    case "adm-users":     page = <AdmUsers/>; break;
    case "adm-stores":    page = <AdmStores/>; break;
    case "adm-categories":page = <AdmCategories/>; break;
    case "adm-analytics": page = <AdmAnalytics/>; break;
    case "adm-audit":     page = <AdmAudit/>; break;
    case "adm-settings":  page = <AdmSettings/>; break;
    // Chat
    case "chat":          page = <ChatbotPage me={me}/>; break;
    default: page = <div style={{ padding: 40 }}>Unknown route.</div>;
  }

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: "var(--lumen-dark)" }}
         data-screen-label={current}>
      <Sidebar me={me} route={current} nav={nav}
               collapsed={collapsed} setCollapsed={setCollapsed}
               onLogout={onLogout} cartCount={cartCount}/>
      <main style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column" }}>
        <Topbar me={me} route={current} nav={nav}
                showRoleSwitcher={tweaks.showRoleSwitcher} switchRole={switchRole}
                cartCount={cartCount} onLogout={onLogout}/>
        <div style={{ flex: 1, minWidth: 0 }}>
          {page}
        </div>
      </main>
      {editMode && <TweaksPanel tweaks={tweaks} update={updateTweak} onClose={() => setEditMode(false)}/>}
    </div>
  );
}

// ------------------------------------------------------------
// Tweaks panel
// ------------------------------------------------------------
function TweaksPanel({ tweaks, update, onClose }) {
  return (
    <div style={{
      position: "fixed", right: 20, bottom: 20, zIndex: 200,
      width: 280, background: "var(--lumen)", border: "1px solid var(--border)",
      borderRadius: 14, boxShadow: "0 20px 50px -20px rgba(0,0,0,0.3)", padding: 16,
      fontFamily: "var(--sans)",
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
        <Icon name="sparkle" size={15}/>
        <div style={{ fontFamily: "var(--serif)", fontWeight: 700, fontSize: 15, flex: 1 }}>Tweaks</div>
        <button onClick={onClose} className="btn btn-ghost" style={{ padding: 4 }}>
          <Icon name="close" size={14}/>
        </button>
      </div>

      <div style={{ marginBottom: 14 }}>
        <div className="section-label" style={{ marginBottom: 8 }}>Accent</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
          {Object.entries(ACCENTS).map(([k, a]) => (
            <button key={k} onClick={() => update("accent", k)}
              style={{
                display: "flex", alignItems: "center", gap: 8, padding: "7px 10px",
                border: "1px solid " + (tweaks.accent === k ? "var(--fathom)" : "var(--border)"),
                background: tweaks.accent === k ? "var(--active-bg)" : "var(--lumen)",
                borderRadius: 9, cursor: "pointer", fontSize: 12, fontWeight: 500,
                textAlign: "left", color: "var(--text)",
              }}>
              <span style={{ width: 14, height: 14, borderRadius: 4, background: a.primary, flexShrink: 0 }}/>
              {a.label.split(" ")[0]}
            </button>
          ))}
        </div>
      </div>

      <div style={{ marginBottom: 14 }}>
        <div className="section-label" style={{ marginBottom: 8 }}>Density</div>
        <div style={{ display: "flex", gap: 6 }}>
          {["compact", "comfortable"].map(d => (
            <button key={d} onClick={() => update("density", d)}
              style={{
                flex: 1, padding: "7px 10px", fontSize: 12, fontWeight: 500,
                border: "1px solid " + (tweaks.density === d ? "var(--fathom)" : "var(--border)"),
                background: tweaks.density === d ? "var(--active-bg)" : "var(--lumen)",
                borderRadius: 9, cursor: "pointer", textTransform: "capitalize", color: "var(--text)",
              }}>{d}</button>
          ))}
        </div>
      </div>

      <div style={{ marginBottom: 4 }}>
        <label style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", padding: "4px 0", fontSize: 13 }}>
          <input type="checkbox" checked={tweaks.showRoleSwitcher}
            onChange={e => update("showRoleSwitcher", e.target.checked)}/>
          Show role switcher in topbar
        </label>
        <label style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", padding: "4px 0", fontSize: 13 }}>
          <input type="checkbox" checked={tweaks.sidebarCollapsedDefault}
            onChange={e => update("sidebarCollapsedDefault", e.target.checked)}/>
          Collapse sidebar by default
        </label>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
