services:
  postgres:
    image: postgres:16-alpine
    container_name: ecom-postgres
    environment:
      POSTGRES_DB: ecommerce_demo
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ecom-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILE: postgres
      DB_URL: jdbc:postgresql://postgres:5432/ecommerce_demo
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set to at least 64 characters for HS512 signing}
      AI_API_KEY: ${AI_API_KEY:-}
      CHATBOT_API_KEY: ${CHATBOT_API_KEY:-shared-secret-change-me}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      CORS_ALLOWED_ORIGINS: http://localhost,http://frontend
    ports:
      - "8080:8080"

  chatbot:
    build: ./chatbot
    container_name: ecom-chatbot
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      USE_SHARED_DB: "true"
      DATABASE_URL: postgresql+psycopg2://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/ecommerce_demo
      AI_API_KEY: ${AI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gemini-3-flash-preview}
      CHATBOT_API_KEY: ${CHATBOT_API_KEY:-shared-secret-change-me}
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: ecom-frontend
    depends_on:
      - backend
      - chatbot
    ports:
      - "80:80"

volumes:
  postgres-data:
