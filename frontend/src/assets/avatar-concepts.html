  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #0f0d12;
    color: #e2dfe8;
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 40px 24px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }
  header h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #2dd4a8, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  header p {
    color: #7a7590;
    font-size: 0.9rem;
    font-family: 'JetBrains Mono', monospace;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(680px, 1fr));
    gap: 32px;
    max-width: 1500px;
    margin: 0 auto;
  }

  .card {
    background: #16131c;
    border: 1px solid #2a2636;
    border-radius: 16px;
    padding: 28px;
    transition: border-color 0.3s;
  }
  .card:hover { border-color: #3d3654; }

  .card-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .card-header .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: #4a4460;
    background: #1e1b27;
    padding: 4px 8px;
    border-radius: 6px;
  }
  .card-header h2 {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .card-header .vibe {
    font-size: 0.75rem;
    color: #9d8ec9;
    font-family: 'JetBrains Mono', monospace;
    margin-left: auto;
    background: rgba(157,142,201,0.1);
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid rgba(157,142,201,0.2);
  }

  .palette {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    align-items: center;
  }
  .palette span {
    font-size: 0.7rem;
    color: #5a5470;
    margin-right: 4px;
    font-family: 'JetBrains Mono', monospace;
  }
  .swatch {
    width: 20px; height: 20px;
    border-radius: 5px;
    border: 1px solid #2a2636;
  }

  .states {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .state-item {
    text-align: center;
  }
  .state-item .label {
    font-size: 0.65rem;
    color: #5a5470;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .state-item svg {
    background: #0f0d12;
    border: 1px solid #2a2636;
    border-radius: 8px;
    display: block;
  }

  .chat-preview {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: #1a1724;
    border-radius: 12px;
    padding: 16px;
    margin-top: 16px;
    border: 1px solid #2a2636;
  }
  .chat-preview svg {
    flex-shrink: 0;
    border-radius: 8px;
  }
  .chat-bubble {
    background: #222038;
    border-radius: 0 12px 12px 12px;
    padding: 12px 16px;
    font-size: 0.85rem;
    color: #c4bdd6;
    line-height: 1.5;
    max-width: 440px;
  }
  .chat-bubble .name {
    font-weight: 700;
    font-size: 0.75rem;
    margin-bottom: 4px;
    display: block;
  }

  .desc {
    font-size: 0.8rem;
    color: #6b6280;
    line-height: 1.5;
    margin-bottom: 6px;
  }
</style>
</head>

// ─── RENDERER ─────────────────────────────────────────────────

function makeSVG(data, palette, size = 80) {
  const px = size / 16;
  let rects = '';
  for (let y = 0; y < 16; y++) {
    const row = data[y] || '';
    for (let x = 0; x < 16; x++) {
      const ch = row[x];
      if (ch && ch !== '.') {
        const ci = parseInt(ch, 10);
        if (!isNaN(ci) && palette[ci]) {
          rects += `<rect x="${x*px}" y="${y*px}" width="${px}" height="${px}" fill="${palette[ci]}"/>`;
        }
      }
    }
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" shape-rendering="crispEdges">${rects}</svg>`;
}

const stateNames = ['idle','happy','thinking','talking','sleep'];
const stateEmoji = { idle:'😐', happy:'😊', thinking:'🤔', talking:'💬', sleep:'😴' };

const app = document.getElementById('app');

C.forEach((c, i) => {
  const card = document.createElement('div');
  card.className = 'card';

  // header
  let h = `<div class="card-header">
    <span class="num">#${String(i+1).padStart(2,'0')}</span>
    <h2 style="color:${c.palette[1]}">${c.name}</h2>
    <span class="vibe">${c.vibe}</span>
  </div>`;

  // description
  h += `<p class="desc">${c.desc}</p>`;

  // palette
  h += `<div class="palette"><span>palette</span>`;
  c.palette.forEach(col => {
    h += `<div class="swatch" style="background:${col}" title="${col}"></div>`;
  });
  h += `</div>`;

  // states
  h += `<div class="states">`;
  stateNames.forEach(s => {
    h += `<div class="state-item">
      <div class="label">${stateEmoji[s]} ${s}</div>
      ${makeSVG(c.states[s], c.palette, 96)}
    </div>`;
  });
  h += `</div>`;

  // chat preview
  h += `<div class="chat-preview">
    ${makeSVG(c.states.talking, c.palette, 40)}
    <div class="chat-bubble">
      <span class="name" style="color:${c.palette[1]}">${c.name}</span>
      ${c.chatMsg}
    </div>
  </div>`;

  card.innerHTML = h;
  app.appendChild(card);
});
