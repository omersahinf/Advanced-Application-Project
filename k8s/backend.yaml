apiVersion: v1
kind: Service
metadata:
  name: backend
  labels: { app: backend }
spec:
  selector: { app: backend }
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: ecom/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILE
              value: postgres
            - name: DB_URL
              value: jdbc:postgresql://postgres:5432/ecommerce_demo
            - name: DB_USERNAME
              value: postgres
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: ecom-secrets, key: DB_PASSWORD } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: ecom-secrets, key: JWT_SECRET } }
            - name: AI_API_KEY
              valueFrom: { secretKeyRef: { name: ecom-secrets, key: AI_API_KEY } }
            - name: CHATBOT_API_KEY
              valueFrom: { secretKeyRef: { name: ecom-secrets, key: CHATBOT_API_KEY } }
            - name: STRIPE_SECRET_KEY
              valueFrom: { secretKeyRef: { name: ecom-secrets, key: STRIPE_SECRET_KEY } }
          readinessProbe:
            httpGet:
              path: /api-docs
              port: 8080
            initialDelaySeconds: 25
            periodSeconds: 10
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits:   { cpu: 1,    memory: 1Gi }
