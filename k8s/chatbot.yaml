apiVersion: v1
kind: Service
metadata:
  name: chatbot
  labels: { app: chatbot }
spec:
  selector: { app: chatbot }
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot
spec:
  replicas: 1
  selector:
    matchLabels: { app: chatbot }
  template:
    metadata:
      labels: { app: chatbot }
    spec:
      containers:
        - name: chatbot
          image: ecom/chatbot:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: USE_SHARED_DB
              value: "true"
            - name: DATABASE_URL
              value: postgresql+psycopg2://postgres:$(DB_PASSWORD)@postgres:5432/ecommerce_demo
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: ecom-secrets, key: DB_PASSWORD } }
            - name: AI_API_KEY
              valueFrom: { secretKeyRef: { name: ecom-secrets, key: AI_API_KEY } }
            - name: CHATBOT_API_KEY
              valueFrom: { secretKeyRef: { name: ecom-secrets, key: CHATBOT_API_KEY } }
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { cpu: 200m, memory: 384Mi }
            limits:   { cpu: 1,    memory: 1Gi }
